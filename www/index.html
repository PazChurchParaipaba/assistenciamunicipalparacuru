<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SEGOV PARACURU</title>
  
  <link rel="icon" href="logo_paracuru.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  
  <!-- Leaflet CSS for Maps -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button class="theme-toggle" id="themeToggle">🌙 Modo Escuro</button>

  <div class="container">
    <header>
      <img src="logo_paracuru.png" alt="SEGOV PARACURU" class="app-logo">
      <h1>SEGOV PARACURU</h1>
      <div id="authContainer" style="font-size: 0.9rem;">
        <!-- Managed by auth_cidadao.js -->
      </div>
      <p class="subtitle">Faça a diferença na sua rua com 3 passos simples.</p>
    </header>

    <div id="actionMenu" style="display: none; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 2rem;">
      <button id="btnActionProblema" class="btn" style="background: rgba(239, 68, 68, 0.75); backdrop-filter: blur(8px); color: white; height: 70px; font-size: 0.95rem; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 8px 16px rgba(239, 68, 68, 0.2);">🚨<br>Problema</button>
      <button id="btnActionDuvida" class="btn" style="background: rgba(245, 158, 11, 0.75); backdrop-filter: blur(8px); color: white; height: 70px; font-size: 0.95rem; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 8px 16px rgba(245, 158, 11, 0.2);">❓<br>Dúvidas</button>
      <button id="btnActionFeedback" class="btn" style="background: rgba(139, 92, 246, 0.75); backdrop-filter: blur(8px); color: white; height: 70px; font-size: 0.95rem; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 8px 16px rgba(139, 92, 246, 0.2);">💬<br>Feedback</button>
      <button id="btnActionOuvidoria" class="btn" style="background: rgba(249, 115, 22, 0.75); backdrop-filter: blur(8px); color: white; height: 70px; font-size: 0.95rem; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 8px 16px rgba(249, 115, 22, 0.2);">🏛️<br>Ouvidoria</button>
      <button id="btnActionAcompanhar" class="btn" style="grid-column: span 2; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); color: var(--primary); height: 60px; font-size: 1.05rem; border: 2px solid var(--primary); box-shadow: 0 8px 16px rgba(0,0,0,0.1); margin-top: 0.5rem;">📬 Ver Minhas Dúvidas e Respostas</button>
    </div>

    <!-- Quick Form for Duvida/Feedback/Ouvidoria -->
    <div id="quickForm" style="display: none; background: var(--bg-card); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; border: 1px solid var(--border-color);">
      <h3 id="quickFormTitle" style="margin-bottom: 1rem; color: var(--text-main);">...</h3>
      <input type="hidden" id="quickFormType">
      
      <div class="form-group">
        <label for="quickTitle">Sua Mensagem</label>
        <textarea id="quickTitle" placeholder="Digite aqui..." required style="min-height: 100px; width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid var(--border-color); background: transparent; color: var(--text-main); font-family: inherit; margin-bottom: 1rem;"></textarea>
      </div>

      <div class="form-group" id="quickSecGroup" style="display: none;">
        <label style="color: var(--text-muted); font-size: 0.9rem; display: block; margin-bottom: 0.5rem;">Secretaria Direcionada:</label>
        <div id="quickSecBadge" style="display: inline-block; padding: 0.4rem 1rem; background: var(--primary); color: white; border-radius: 99px; font-size: 0.85rem; font-weight: bold; margin-bottom: 1rem;">Governo</div>
        <input type="hidden" id="quickSecretaria" value="Governo">
      </div>

      <div style="display: flex; gap: 1rem;">
        <button type="button" id="btnCancelQuickForm" class="btn btn-secondary" style="flex: 1;">Cancelar</button>
        <button type="button" id="btnSubmitQuickForm" class="btn btn-primary" style="flex: 1;">Enviar</button>
      </div>
    </div>

    <div class="stepper-indicator" id="stepperIndicator" style="display: none;">
      <div class="dot active" id="dot1"></div>
      <div class="dot" id="dot2"></div>
      <div class="dot" id="dot3"></div>
    </div>

    <form id="wizardForm" style="display: none;">
      
      <!-- Step 1: O Que -->
      <div class="step active" id="step1">
        <div class="form-group">
          <label for="title">O que aconteceu?</label>
          <input type="text" id="title" placeholder="Ex: Poste apagado na esquina..." required>
        </div>
        
        <div class="form-group">
          <label for="secretaria">Secretaria Responsável</label>
          <select id="secretaria" required>
            <option value="" disabled selected>Selecione...</option>
            <option value="Infraestrutura">Infraestrutura</option>
            <option value="Saúde">Saúde</option>
            <option value="Meio Ambiente">Meio Ambiente</option>
            <option value="Iluminação Pública">Iluminação Pública</option>
            <option value="Transporte">Transporte</option>
            <option value="Educação">Educação</option>
            <option value="Assistência Social">Assistência Social</option>
            <option value="Turismo">Turismo</option>
            <option value="Governo">Governo</option>
            <option value="Tributos">Tributos</option>
          </select>
        </div>

        <div class="form-group" id="subcategoryGroup" style="display: none;">
          <label for="subcategory">Subcategoria</label>
          <select id="subcategory">
            <option value="" disabled selected>Selecione...</option>
          </select>
        </div>

        <div class="form-group">
          <label for="description">Mais detalhes</label>
          <textarea id="description" placeholder="Descreva a situação..." required></textarea>
        </div>

        <div class="btn-group">
          <button type="button" id="btnCancelWizard" class="btn btn-secondary">Cancelar</button>
          <button type="button" class="btn btn-primary next-btn">Avançar</button>
        </div>
      </div>

      <!-- Step 2: Onde -->
      <div class="step" id="step2">
        <div class="form-group">
          <label>Onde está o problema?</label>
          <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem;">
            Arraste o mapa para colocar o pino no local exato.
          </p>
          <div id="map"></div>
          <button type="button" id="btnMyLocation" class="btn btn-secondary" style="margin-bottom: 1rem;">📍 Usar Minha Localização GPS</button>
          
          <label for="endereco" style="margin-top: 1rem;">Endereço (Rua/Avenida)</label>
          <input type="text" id="endereco" placeholder="Ex: Rua João Paulo II" style="margin-bottom: 1rem;">

          <label for="bairro">Bairro / Localidade</label>
          <input type="text" id="bairro" placeholder="Ex: Centro">
        </div>

        <div class="btn-group">
          <button type="button" class="btn btn-secondary prev-btn">Voltar</button>
          <button type="button" class="btn btn-primary next-btn">Avançar</button>
        </div>
      </div>

      <!-- Step 3: Foto e Envio -->
      <div class="step" id="step3">
        <div class="form-group">
          <label>Envie uma foto (Obrigatório)</label>
          <div class="file-upload-wrapper" id="uploadWrapper">
            <span style="color: var(--text-muted); font-weight: 500;">📸 Toque para escolher ou tirar foto</span>
            <input type="file" id="photo" accept="image/*" required>
          </div>
          <img id="photoPreview" class="image-preview" alt="Preview">
        </div>

        <div class="btn-group">
          <button type="button" class="btn btn-secondary prev-btn">Voltar</button>
          <button type="submit" class="btn btn-primary" style="background-color: var(--secondary);">🚀 Enviar Relato</button>
        </div>
      </div>

    </form>
    
    <!-- Acesso servidor removido conforme solicitado -->
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="auth_cidadao.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
